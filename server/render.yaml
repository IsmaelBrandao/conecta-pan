# Blueprint do Render para o backend Socket.IO.
# No painel do Render: New > Blueprint, aponte para este repo.
services:
  - type: web
    name: conecta-pan-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
